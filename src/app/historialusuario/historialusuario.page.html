<ion-header class="ion-no-border">
  <ion-toolbar mode="ios">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/perfilusuario" icon="arrow-back-outline" text="Atrás" class="custom-back-button"></ion-back-button>
    </ion-buttons>
    <ion-title>Historial de viajes</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="history-list">
    @for (trip of trips; track trip.id) {
      <div class="trip-card" [class.cancelled]="trip.status === 'cancelled'">
        
        <div class="card-top">
          <div class="icon-bg">
            <ion-icon name="car-outline"></ion-icon>
          </div>
          <div class="info">
            <h2>Viaje SmartTaxi</h2>
            <p>{{ trip.date }}</p>
          </div>
          <div class="price">
            <span class="amount">${{ trip.price.toFixed(2) }}</span>
          </div>
        </div>

        <div class="card-bottom">
          <div class="route-indicator">
            <div class="dot gold"></div>
            <div class="line"></div>
            <div class="dot orange"></div>
          </div>
          <div class="addresses">
            <span class="text-truncate">{{ trip.origin }}</span>
            <span class="text-truncate">{{ trip.destination }}</span>
          </div>
          <div class="status-tag">
            @if (trip.status === 'completed') {
              <ion-icon name="checkmark-circle" color="success"></ion-icon>
            } @else {
              <ion-icon name="close-circle" color="danger"></ion-icon>
            }
          </div>
        </div>
      </div>
    } @empty {
      <div class="empty-msg">
        <ion-icon name="car-outline"></ion-icon>
        <p>Aún no tienes viajes registrados</p>
      </div>
    }
  </div>
</ion-content>
