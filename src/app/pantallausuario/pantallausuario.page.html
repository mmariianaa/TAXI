<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    
    <ion-title>Usuario</ion-title>
    
    <ion-buttons slot="end">
      <ion-button (click)="irANotificaciones()">
        <ion-icon slot="icon-only" name="notifications-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content [fullscreen]="true" class="ion-padding">
  
  <div class="search-container">
    <ion-item lines="none" class="custom-input">
      <ion-icon name="location-outline" slot="start" color="primary"></ion-icon>
      <ion-input 
        label="Origen" 
        labelPlacement="stacked" 
        placeholder="Mi ubicación" 
        [(ngModel)]="origen">
      </ion-input>
    </ion-item>

    <ion-item lines="none" class="custom-input">
      <ion-icon name="flag-outline" slot="start" color="danger"></ion-icon>
      <ion-input 
        label="Destino" 
        labelPlacement="stacked" 
        placeholder="¿A dónde vas?" 
        [(ngModel)]="destino"
        (keyup.enter)="buscarDestino()">
      </ion-input>
      <ion-button slot="end" fill="clear" (click)="buscarDestino()">
        <ion-icon name="search-outline" color="dark"></ion-icon>
      </ion-button>
    </ion-item>
  </div>

  <div class="map-box">
    <div id="map"></div>
    <ion-badge *ngIf="mostrarTaxis" color="light" class="map-badge">Ruta activa</ion-badge>
  </div>

  <div *ngIf="mostrarTaxis">
    <ion-list-header>
      <ion-label>Taxis disponibles</ion-label>
    </ion-list-header>

    <ion-list lines="full">
      @for (taxi of listaTaxis; track taxi.conductor) {
        <ion-item button (click)="seleccionarTaxi(taxi)">
          <ion-icon name="car-sport" slot="start"></ion-icon>
          <ion-label>
            <h2>{{ taxi.conductor }}</h2>
            <p>{{ taxi.modelo }}</p>
          </ion-label>
          <ion-note slot="end" color="success">${{ taxi.precio }}</ion-note>
        </ion-item>
      } @empty {
        <ion-item>No hay taxis cerca</ion-item>
      }
    </ion-list>

    <ion-button expand="block" shape="round" color="secondary" (click)="sugerirRuta()" class="ion-margin-top">
      <ion-icon name="dice-outline" slot="start"></ion-icon>
      Sugerir Ruta Rápida
    </ion-button>
  </div>

  <div *ngIf="!mostrarTaxis" class="ion-text-center ion-padding">
    <p>Ingresa un destino para ver taxis disponibles</p>
  </div>

</ion-content>
