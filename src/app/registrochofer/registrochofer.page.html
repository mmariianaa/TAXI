<div class="registro-container">
  <h2>🚖 Registro de Chofer</h2>
  <form (ngSubmit)="registrarChofer()" #choferForm="ngForm">

    <div class="form-group">
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" [(ngModel)]="chofer.nombre" required />
    </div>

    <div class="form-group">
      <label for="apellido">Apellido</label>
      <input type="text" id="apellido" name="apellido" [(ngModel)]="chofer.apellido" required />
    </div>

    <div class="form-group">
      <label for="edad">Edad</label>
      <input type="number" id="edad" name="edad" [(ngModel)]="chofer.edad" min="18" required />
    </div>

    <div class="form-group">
      <label for="correo">Correo</label>
      <input type="email" id="correo" name="correo" [(ngModel)]="chofer.correo" required />
    </div>

    <div class="form-group">
      <label for="telefono">Teléfono</label>
      <input type="text" id="telefono" name="telefono" [(ngModel)]="chofer.telefono" />
    </div>

    <div class="form-group">
      <label for="contrasena">Contraseña</label>
      <input type="password" id="contrasena" name="contrasena" [(ngModel)]="chofer.contrasena" required />
    </div>

    <button type="submit" class="btn-registrar">Registrar Chofer</button>
  </form>
</div>
